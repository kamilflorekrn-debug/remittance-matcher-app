name: Build RemittanceMatcherApp

on:
  workflow_dispatch:
  push:
    branches: [ "main" ]

jobs:
  publish:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore
        run: dotnet restore ./RemittanceMatcherApp.csproj

      - name: Publish
        run: dotnet publish ./RemittanceMatcherApp.csproj -c Release -r win-x64 --self-contained true -o ./artifacts/publish

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: RemittanceMatcherApp-win-x64
          path: ./artifacts/publish/**
